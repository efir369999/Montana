# Acknowledged advisories — глубокий критик-аудит стека. Ни одна не эксплойтабельна
# в наших сборках; обоснование каждой ниже.
[advisories]
ignore = [
    # hickory-proto DoS (name-compression O(n²) + NSEC3 loop): НЕ в реальной сборке
    # (cargo tree для наших target — nothing to print; lock-residual, не компилируется).
    "RUSTSEC-2026-0119",
    "RUSTSEC-2026-0118",
    # instant unmaintained: транзитив reed-solomon 6.0.0→parking_lot 0.11.2 (latest reed-solomon);
    # time-crate, unmaintained != vulnerable.
    "RUSTSEC-2024-0384",
    # anyhow downcast_mut unsound: downcast_mut не используется, не в runtime-дереве.
    "RUSTSEC-2026-0190",
    # paste unmaintained: транзитив (proc-macro helper), unmaintained != vulnerable.
    "RUSTSEC-2024-0436",
    # time DoS (stack exhaustion в парсинге): time тянется от rcgen (генерация self-signed
    # cert для QUIC-стенда Этапа 1) — наши даты, attacker-input не парсится, эксплойт-путь
    # отсутствует. Обновление time 0.3.45+ тянет serde_derive-конфликт (ломает стек).
    "RUSTSEC-2026-0009",
]
